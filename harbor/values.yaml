# https://github.com/goharbor/harbor-helm/blob/main/values.yaml

expose:
  type: clusterIP
  tls:
    enabled: false
  clusterIP:
    name: harbor
    annotations: {}
    ports:
      httpPort: 80
      httpsPort: 443

externalURL: https://registry.ns.trap.jp

internalTLS:
  enabled: false

ipFamily:
  ipv6:
    enabled: true
  ipv4:
    enabled: true

persistence:
  enabled: true
  resourcePolicy: "keep"
  imageChartStorage:
    type: s3
    s3:
      # Set an existing secret for S3 accesskey and secretkey
      # keys in the secret should be REGISTRY_STORAGE_S3_ACCESSKEY and REGISTRY_STORAGE_S3_SECRETKEY for registry
      existingSecret: "storage"
      region: ap-northeast-1
      bucket: trap-ns-registry
      regionendpoint: https://s3.ap-northeast-1.wasabisys.com

imagePullPolicy: Always

# The update strategy for deployments with persistent volumes(jobservice, registry): "RollingUpdate" or "Recreate"
# Set it as "Recreate" when "RWM" for volumes isn't supported
updateStrategy:
  type: RollingUpdate

# debug, info, warning, error or fatal
logLevel: info

existingSecretAdminPassword: "admin-password"
existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD

existingSecretSecretKey: "secret-key"

# Run the migration job via helm hook
enableMigrateHelmHook: false

# If service exposed via "ingress", the Nginx will not be used
nginx:
  revisionHistoryLimit: 0

portal:
  revisionHistoryLimit: 0

core:
  # core-cert generated with the following helm function: genCA "harbor-token-ca" 36500
  secretName: core-cert
  revisionHistoryLimit: 0
  extraEnvVars:
    - name: POSTGRESQL_PASSWORD
      valueFrom:
        secretKeyRef:
          name: database-credentials
          key: password
  resources:
    requests:
      cpu: "100m"
      memory: "100Mi"
    limits:
      cpu: "300m"
      memory: "500Mi"

jobservice:
  maxJobWorkers: 1
  jobLoggers:
    - stdout
  revisionHistoryLimit: 0
  resources:
    requests:
      cpu: "100m"
      memory: "100Mi"
    limits:
      cpu: "300m"
      memory: "500Mi"

registry:
  registry:
    resources:
      requests:
        cpu: "100m"
        memory: "100Mi"
      limits:
        cpu: "2000m"
        memory: "500Mi"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - c1-203.tokyotech.org
  controller:
    resources:
      requests:
        cpu: "100m"
        memory: "100Mi"
      limits:
        cpu: "300m"
        memory: "300Mi"
  revisionHistoryLimit: 0
  credentials:
    username: "registry"
    existingSecret: registry-credentials

trivy:
  enabled: false
  # Has PersistentVolumeClaim
  nodeSelector:
    kubernetes.io/hostname: c1-203.tokyotech.org
  resources:
    requests:
      cpu: "10m"
      memory: "20Mi"
    limits:
      cpu: "1"
      memory: "500Mi"

database:
  type: internal
  internal:
    # The actual password is provided from database-credentials.
    password: "unused-managed-by-database-credentials"
    extraEnvVars:
      - name: POSTGRES_PASSWORD
        valueFrom:
          secretKeyRef:
            name: database-credentials
            key: password
    shmSizeLimit: 128Mi
    livenessProbe:
      timeoutSeconds: 5
    readinessProbe:
      timeoutSeconds: 5
    # Has PersistentVolumeClaim
    nodeSelector:
      kubernetes.io/hostname: c1-203.tokyotech.org
    resources:
      requests:
        cpu: "10m"
        memory: "100Mi"
      limits:
        cpu: "300m"
        memory: "200Mi"

redis:
  type: internal
  internal:
    # Has PersistentVolumeClaim
    nodeSelector:
      kubernetes.io/hostname: c1-203.tokyotech.org
    resources:
      requests:
        cpu: "10m"
        memory: "100Mi"
      limits:
        cpu: "100m"
        memory: "500Mi"

exporter:
  revisionHistoryLimit: 0
  extraEnvVars:
    - name: HARBOR_DATABASE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: database-credentials
          key: password

metrics:
  enabled: false

trace:
  enabled: false
