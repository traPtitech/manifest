mode: dev-and-prod

repo:
  owner: traPtitech
  repo: traQ_S-UI

webhook:
  name: traq-preview

tls:
  secretName: preview-traq-tls

host:
  base: traq-preview.trapti.tech

preview:
  imagePattern: "ghcr.io/traptitech/traq-ui:preview-{{number}}-{{head_sha}}"

backend:
  matcher: PathPrefix(`/api`) || PathPrefix(`/.well-known`)
  service:
    kind: Service
    namespace: 'traq{{ if eq . "dev" }}-dev{{ end }}'
    name: traq-backend
    port: 8001
    scheme: http
    weight: 1

staging:
  enabled: true
  # renovate:image-full
  image: "ghcr.io/traptitech/traq-ui:master@sha256:e5e175bac53c712b144a6285305dfae1a260d2a7d239d94c46998c337c99dfc9"

otherParameters:
  port: 80

initContainers:
  - name: convert-config
    image: busybox:1.36.1
    command: ["sh", "-c"]
    args:
      - |
        {
          printf ';(() => { self.traQConfig = '
          cat /config-in/config.jsonc
          printf '; })()'
        } > /app/override/config.js
    volumeMounts:
      - name: config-json
        mountPath: /config-in
      - name: config-js
        mountPath: /app/override
    resources:
      requests:
        cpu: "10m"
        memory: "128Mi"
      limits:
        cpu: "40m"
        memory: "256Mi"

containers:
  volumeMounts:
    - name: config-js
      mountPath: /app/override

volumes:
  - name: config-json
    configMap:
      name: preview-traq-config
  - name: config-js
    emptyDir: {}
