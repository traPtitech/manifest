apiVersion: apps/v1
kind: Deployment
metadata:
  name: anke-to-server
  labels:
    app: anke-to-server

spec:
  selector:
    matchLabels:
      app: anke-to-server
  template:
    metadata:
      labels:
        app: anke-to-server
    spec:
      nodeSelector:
        kubernetes.io/hostname: eee101.tokyotech.org

      containers:
        - name: anke-to-server
          image: ghcr.io/traptitech/anke-to:main@sha256:435e78a01257d47922aa27d4de171b72c1accca7ec2f496e45ddcbd6edba6f03
          env:
            - name: ENV
              value: "staging"
            - name: MARIADB_USERNAME
              value: "service_anke_to_dev"
            - name: MARIADB_HOSTNAME
              value: "tailscale.kmbk.tokyotech.org"
            - name: MARIADB_DATABASE
              value: "service_anke_to_dev"
            - name: MARIADB_PORT
              value: "33060"
            - name: PORT
              value: ":3000"
            - name: TZ
              value: "Asia/Tokyo"
          envFrom:
            - secretRef:
                name: anke-to-secrets
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
