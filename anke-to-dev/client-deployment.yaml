apiVersion: apps/v1
kind: Deployment
metadata:
  name: anke-to-client
  labels:
    app: anke-to-client

spec:
  selector:
    matchLabels:
      app: anke-to-client
  template:
    metadata:
      labels:
        app: anke-to-client
    spec:
      nodeSelector:
        kubernetes.io/hostname: eee101.tokyotech.org

      containers:
        - name: anke-to-client
          image: ghcr.io/traptitech/anke-to-ui:main@sha256:86633a26723fd0ee0ef14ceef744d97be5c3d8eeab601d50771bf78bd4178d63
          ports:
            - name: http
              containerPort: 80
