mode: dev-and-prod

repo:
  owner: traPtitech
  repo: knoQ_R-UI

webhook:
  name: knoq-preview

tls:
  secretName: preview-knoq-tls

host:
  base: knoq-preview.trapti.tech

preview:
  imagePattern: "ghcr.io/traptitech/knoq-ui:preview-{{number}}-{{head_sha}}"

backend:
  matcher: PathPrefix(`/api`)
  service:
    kind: Service
    namespace: 'knoq{{ if eq . "dev" }}-dev{{ end }}'
    name: knoq-preview
    port: 3000
    scheme: http
    weight: 1

staging:
  enabled: true
  # renovate:image-full
  image: "ghcr.io/traptitech/knoq-ui:main@sha256:1"

otherParameters:
  port: 80
