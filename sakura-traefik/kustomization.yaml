apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: traefik

helmCharts:
  - name: traefik
    repo: https://traefik.github.io/charts
    version: v33.2.1
    releaseName: sakura-traefik
    namespace: traefik
    valuesFile: values.yaml

resources:
  - dashboard.yaml
  - config.yaml
  - custom-errors.yaml
  - catch-all.yaml
  - metrics-service.yaml
