---
# catch-all for http
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: catch-all-http
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: HostRegexp(`^.+$`)
      priority: -10000
      middlewares:
        - name: https-redirect
      services:
        - name: dashboard@internal
          kind: TraefikService
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
spec:
  redirectScheme:
    scheme: https