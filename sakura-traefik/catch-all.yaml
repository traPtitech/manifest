apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: catch-all-https-trap-games
spec:
  secretName: trap-games-tls
  dnsNames:
    - trap.games
    - "*.trap.games"
  issuerRef:
    name: cluster-issuer
    kind: ClusterIssuer
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: catch-all-trap-games
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: HostRegexp(`^(.+\.)?trap.games$`)
      priority: -10000
      services:
        - name: custom-errors
          port: 80
          kind: Service
  tls:
    secretName: trap-games-tls
---
