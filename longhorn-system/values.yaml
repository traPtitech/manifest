global:
  timezone: Asia/Tokyo

# nodeSelector設定
longhornManager:
  nodeSelector: {}
  tolerations:
    - key: monitor-node
      operator: Equal
      value: "true"
      effect: NoSchedule
longhornDriver:
  nodeSelector:
    kubernetes.io/hostname: csc301.tokyotech.org
longhornUI:
  nodeSelector:
    kubernetes.io/hostname: csc301.tokyotech.org

persistence:
  defaultClass: false # 性能をどの程度要求するか不明なため、一旦デフォルトにしない

defaultSettings:
  taintTolerations: "monitor-node=true:NoSchedule" # engine-image-eiをデプロイするため

preUpgradeChecker:
  jobEnabled: false # ArgoCDで管理する場合はfalse
