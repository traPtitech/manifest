apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: codimd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`md-dev.trapti.tech`) && PathPrefix(`/uploads`)
      kind: Rule
      priority: 20
      middlewares:
        - name: codimd-uploads-redirect
      services:
        - name: codimd
          port: 3000

    - match: Host(`md-dev.trapti.tech`)
      kind: Rule
      priority: 10
      services:
        - name: codimd
          port: 3000
  tls:
    secretName: codimd-tls
