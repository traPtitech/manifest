apiVersion: apps/v1
kind: Deployment
metadata:
  name: codimd
  labels:
    app.kubernetes.io/name: codimd

spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: codimd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codimd
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - eee101.tokyotech.org
              weight: 1

      containers: 
        - name: codimd
          image: ghcr.io/traptitech/codimd:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: CMD_DB_URL
              valueFrom:
                secretKeyRef:
                  name: codimd-secret
                  key: CMD_DB_URL
            - name: CMD_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: codimd-secret
                  key: CMD_SESSION_SECRET
            - name: CMD_CONFIG_FILE
              value: "/home/hackmd/app/config.json"
            - name: CMD_TRUST_PROXY
              value: "true"
            - name: NODE_ENV
              value: "production"
          volumeMounts:
            - name: codimd-config
              mountPath: /home/hackmd/app/config.json
              subPath: config.json
            - name: upload-data
              mountPath: /home/hackmd/app/public/uploads
      volumes:
        - name: codimd-config
          secret:
            secretName: codimd-secret
            items:
              - key: config.json
                path: config.json
        - name: upload-data
          emptyDir: {}
