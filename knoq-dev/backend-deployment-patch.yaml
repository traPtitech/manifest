apiVersion: apps/v1
kind: Deployment
metadata:
  name: knoq-backend
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - eee101.tokyotech.org
              weight: 1

      containers:
        - name: knoq-backend
          image: ghcr.io/traptitech/knoq:main@sha256:33ad7c0f3d9ceab6a723eea7ed297163c839bffdc363a0548dc6ffb941ad9422
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          env:
            - name: MARIADB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: knoq-secret
                  key: MARIADB_USERNAME
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: knoq-secret
                  key: MARIADB_PASSWORD
            - name: MARIADB_HOSTNAME
              value: "tailscale.kmbk.tokyotech.org"
            - name: MARIADB_DATABASE
              value: "service_knoq_dev"
            - name: MARIADB_PORT
              value: "33060"
            - name: SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: knoq-secret
                  key: SESSION_KEY
            - name: TOKEN_KEY
              valueFrom:
                secretKeyRef:
                  name: knoq-secret
                  key: TOKEN_KEY
            - name: TRAQ_CALENDARID
              valueFrom:
                secretKeyRef:
                  name: knoq-secret
                  key: TRAQ_CALENDARID
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: knoq-secret
                  key: CLIENT_ID
            - name: WEBHOOK_ID
              valueFrom:
                secretKeyRef:
                  name: knoq-secret
                  key: WEBHOOK_ID
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: knoq-secret
                  key: WEBHOOK_SECRET
            - name: TRAQ_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: knoq-secret
                  key: TRAQ_ACCESS_TOKEN
            - name: DAILY_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: knoq-secret
                  key: DAILY_CHANNEL_ID
            - name: ACTIVITY_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: knoq-secret
                  key: ACTIVITY_CHANNEL_ID
            - name: ORIGIN
              value: "https://knoq-dev.trapti.tech"
