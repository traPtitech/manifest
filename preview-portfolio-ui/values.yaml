mode: dev-and-prod

repo:
  owner: traPtitech
  repo: traPortfolio-UI

webhook:
  name: portfolio-preview

tls:
  secretName: preview-portfolio-ui-tls

host:
  base: portfolio-preview.trapti.tech

preview:
  imagePattern: "ghcr.io/traptitech/traportfolio-ui:preview-{{number}}-{{head_sha}}"

backend:
  matcher: PathPrefix(`/api`)
  service:
    kind: Service
    namespace: 'portfolio{{ if eq . "dev" }}-dev{{ end }}'
    name: portfolio-backend
    port: 3009
    scheme: http
    weight: 1

staging:
  enabled: true
  # renovate:image-full
  image: "ghcr.io/traptitech/traportfolio-ui:main@sha256:f3fbec4c31db08c9482b015a2918068e8e23a92755e47b984afb413ce0944541"

otherParameters:
  port: 80
