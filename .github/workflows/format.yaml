name: Format

on:
  pull_request:

jobs:
  format:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Node and Prettier with mise
        uses: jdx/mise-action@v4
        with:
          install_args: node prettier

      - name: Check formatting
        run: prettier --check .
