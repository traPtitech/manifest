name: Format

on:
  pull_request:

jobs:
  format:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Prettier with mise
        uses: jdx/mise-action@v4
        with:
          install_args: prettier

      - name: Check formatting
        run: prettier --check .
