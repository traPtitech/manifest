name: Validate Renovate Config

on:
  pull_request:
    paths:
      - ".github/renovate-bot.js"
      - ".github/renovate/**"
  workflow_dispatch:

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Validate renovate-bot.js
        if: ${{ hashFiles('.github/renovate-bot.js') != '' }}
        run: |
          npx --yes --package renovate -- renovate-config-validator .github/renovate-bot.js
        env:
          RENOVATE_GITHUB_PAT: placeholder

      - name: Validate renovate directory configs
        run: |
          find .github/renovate -type f -name '*.json5' -exec npx --yes --package renovate -- renovate-config-validator {} \;