apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: portal-dev-backend
  name: portal-dev-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal-dev-backend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: portal-dev-backend
    spec:
      nodeSelector:
        kubernetes.io/hostname: "eee101.tokyotech.org"
      containers:
        - env:
            - name: DB_DATABASE
              value: service_portal_dev
            - name: DB_HOST
              value: tailscale.kmbk.tokyotech.org
            - name: DB_PORT
              value: "33060"
            - name: DB_USER
              value: service_portal_dev
            - name: WITHOUT_MAIL
              value: "true"
            - name: WITHOUT_TRAQ
              value: "true"
          envFrom:
            - secretRef:
                name: portal-dev-db-password
          image: ghcr.io/traptitech/portal:staging@sha256:4da5f9d06812e07298f56bdbf1c68ab207c91c3a808ce748d67b6d75a742f925
          name: portal-dev
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          volumeMounts:
            - mountPath: /app/ec_pub.pem
              name: ec-pub
              readOnly: true
              subPath: ec_pub.pem
            - mountPath: /app/ec.pem
              name: ec-private
              readOnly: true
              subPath: ec.pem
      restartPolicy: Always
      volumes:
        - name: ec-pub
          secret:
            secretName: portal-dev-ec-pub
        - name: ec-private
          secret:
            secretName: portal-dev-ec
