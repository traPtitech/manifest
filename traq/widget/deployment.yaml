apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: traq-widget
  name: traq-widget

spec:
  replicas: 1
  selector:
    matchLabels:
      app: traq-widget

  template:
    metadata:
      labels:
        app: traq-widget

    spec:
      nodeSelector:
        kubernetes.io/hostname: las211.tokyotech.org
      containers:
        - image: ghcr.io/traptitech/traq-widget:0.3.7
          name: traq-widget
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "20m"
              memory: "64Mi"

      restartPolicy: Always
