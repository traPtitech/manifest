apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: traq-backend
  name: traq-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traq-backend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: traq-backend
        pyroscope.io/scrape: "true"
        pyroscope.io/port: "6060"
    spec:
      nodeSelector:
        kubernetes.io/hostname: las211.tokyotech.org
      volumes:
        - name: config
          configMap:
            name: traq-config
        - name: keys
          secret:
            secretName: traq-backend-secrets
      containers:
        - image: ghcr.io/traptitech/traq:3.28.1
          name: traq-backend
          args: ["serve", "--pprof"]
          ports:
            - containerPort: 3000
              protocol: TCP
          volumeMounts:
            - mountPath: /keys
              name: keys
              readOnly: true
            - mountPath: /app/config.yml
              name: config
              readOnly: true
              subPath: traq.yaml
          env:
            - name: TRAQ_ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: traq-config-secrets
                  key: es_password
            - name: TRAQ_MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: traq-config-secrets
                  key: mariadb_password
            - name: TRAQ_STORAGE_S3_ACCESSKEY
              valueFrom:
                secretKeyRef:
                  name: traq-config-secrets
                  key: storage_s3_accessKey
            - name: TRAQ_STORAGE_S3_SECRETKEY
              valueFrom:
                secretKeyRef:
                  name: traq-config-secrets
                  key: storage_s3_secretKey
            - name: TRAQ_SKYWAY_SECRETKEY
              valueFrom:
                secretKeyRef:
                  name: traq-config-secrets
                  key: skyway_secretKey
            - name: TRAQ_LIVEKIT_APIKEY
              valueFrom:
                secretKeyRef:
                  name: traq-config-secrets
                  key: livekit_apiKey
            - name: TRAQ_LIVEKIT_APISECRET
              valueFrom:
                secretKeyRef:
                  name: traq-config-secrets
                  key: livekit_apiSecret
            - name: OTEL_SERVICE_NAME
              value: traq-prod
            - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
              value: grpc
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://alloy-ds.alloy.svc.cluster.local:4317
            - name: OTEL_TRACES_SAMPLER
              value: parentbased_traceidratio
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "0.3"
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1500m"
              memory: "512Mi"

      restartPolicy: Always
