          image: ghcr.io/traptitech/traq-ui:master@sha256:bdf03754a5beac5185cdae13248b4a597cf9ec5a5fe46951138dacd340cf153e
          env:
            - name: NEW_RELIC_LICENSE_KEY
              value: "NRJS-5c70f08b45082feb140"
