---
resources:
  - ../ns-system/components/builder-deployment.yaml

configMapGenerator:
  - files:
      - config/ns.yaml
    name: ns-config
  - files:
      - config/known_hosts
    name: known-hosts
  - files:
      - config/buildkitd.toml
    name: buildkit-config

images:
  - name: ns-builder
    newName: ghcr.io/traptitech/ns-builder
    newTag: 1.10.24

patches:
  - target:
      kind: Deployment
      name: ns-builder
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/nodeSelector
        value:
          kubernetes.io/hostname: c1-203.tokyotech.org
      - op: add
        path: /spec/template/spec/hostNetwork
        value: true
      - op: add
        path: /spec/template/spec/dnsPolicy
        value: ClusterFirstWithHostNet

generators:
  - ksops.yaml

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
