helmCharts:
  - repo: oci://registry.toki317.dev/pub/charts # TODO: replace to ghcr.io/traptitech/charts after publication
    name: neoshowcase
    version: "1.9.1"
    includeCRDs: true
    namespace: ns-dev-system
    releaseName: ns
    valuesFile: values.yaml

resources:
  - app-namespace.yaml
  - certificate.yaml

patches:
  - path: db/adminer-certificate-patch.yaml
  - path: db/adminer-deployment-patch.yaml
  - path: db/adminer-ingress-route-patch.yaml
  - path: db/mariadb-stateful-set-patch.yaml
  - path: db/mongo-stateful-set-patch.yaml
  - path: app-namespace-patch.yaml

generators:
  - ksops.yaml
