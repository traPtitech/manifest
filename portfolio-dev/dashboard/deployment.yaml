apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: portfolio-dashboard
  name: portfolio-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-dashboard
  template:
    metadata:
      labels:
        app: portfolio-dashboard
    spec:
      nodeSelector:
        kubernetes.io/hostname: eee101.tokyotech.org
      containers:
        - image: ghcr.io/traptitech/traportfolio-dashboard:main@sha256:56ad328f332272989b5e0aad8a4d6f7e4d8ca81fad9d08c2cab1c20fcfb63bde
          name: portfolio-dashboard
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
