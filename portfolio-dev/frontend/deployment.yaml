apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: portfolio-frontend
  name: portfolio-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-frontend
  template:
    metadata:
      labels:
        app: portfolio-frontend
    spec:
      nodeSelector:
        kubernetes.io/hostname: eee101.tokyotech.org
      containers:
        - image: ghcr.io/traptitech/traportfolio-ui:main@sha256:51c4212fcceefee3e535160c610b7958ce02b9bbfe74d872dde2a3be58aa583a
          name: portfolio-frontend
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
