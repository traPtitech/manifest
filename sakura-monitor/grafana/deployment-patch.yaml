apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana

spec:
  replicas: 1
  template:
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - sce312.tokyotech.org
              weight: 1
      tolerations:
        - key: monitor-node
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: grafana
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: db-password
          # base (monitor/grafana) の limits は memory 500Mi / cpu 300m。
          # sce312 では定常 200-300Mi・周期的に ~500Mi までスパイクし、
          # 500Mi の limit に張り付いて OOMKill による再起動を繰り返していた。
          # limit に余裕を持たせて OOMKill を解消する。request は定常値ベースで控えめにし、
          # 起動時スパイクはノードの Swap に委ねる。
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
      volumes:
        - $patch: replace
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: config
          configMap:
            name: grafana
