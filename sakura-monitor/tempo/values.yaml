tempo:
  extraArgs:
    config.expand-env: true
  reportingEnabled: false

  memBallastSizeMbs: 0

  ingester:
    max_block_bytes: 20971520 # 20MiB
  querier:
    max_concurrent_queries: 5

  storage:
    trace:
      backend: s3
      s3:
        endpoint: s3.ap-northeast-1.wasabisys.com
        bucket: trap-tempo
        access_key: ${S3_ACCESS_KEY_ID}
        secret_key: ${S3_SECRET_ACCESS_KEY}
  retention: 168h

  server:
    http_listen_port: 3200
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  extraEnv:
    - name: GOMEMLIMIT
      value: 450MiB
    - name: S3_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: tempo-s3-credentials
          key: s3-access-key
    - name: S3_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: tempo-s3-credentials
          key: s3-secret-key

tolerations:
  - key: monitor-node
    operator: Equal
    value: "true"
    effect: NoSchedule

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - preference:
          matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - sce312.tokyotech.org
        weight: 1

persistence:
  enabled: true
  enableStatefulSetAutoDeletePVC: true
  size: 5Gi
