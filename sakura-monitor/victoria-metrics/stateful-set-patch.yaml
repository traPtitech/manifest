apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: victoria-metrics

spec:
  replicas: 0
  volumeClaimTemplates:
    - metadata:
        name: storage-longhorn
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: sce311.tokyotech.org
      containers:
        - name: victoria-metrics
          resources:
            requests:
              cpu: "100m"
              memory: "800Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
