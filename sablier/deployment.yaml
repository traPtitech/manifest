apiVersion: apps/v1
kind: Deployment
metadata:
  name: sablier

spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: sablier
  template:
    metadata:
      labels:
        app: sablier
    spec:
      enableServiceLinks: false
      serviceAccountName: sablier
      volumes:
        - name: config
          configMap:
            name: sablier
      containers:
        - name: sablier
          image: sablierapp/sablier:1.16.0
          ports:
            - name: http
              containerPort: 10000
          resources:
            requests:
              cpu: "20m"
              memory: "48Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/sablier/sablier.yaml
              subPath: sablier.yaml
